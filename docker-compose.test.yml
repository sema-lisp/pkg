version: "3.8"

# Multi-driver integration test suite.
# Runs the Rust test suite against SQLite, PostgreSQL, and MySQL.
#
# Usage:
#   make test-all-drivers
#   # or manually:
#   docker compose -f docker-compose.test.yml up -d postgres mysql
#   docker compose -f docker-compose.test.yml run --rm test-sqlite
#   docker compose -f docker-compose.test.yml run --rm test-postgres
#   docker compose -f docker-compose.test.yml run --rm test-mysql
#   docker compose -f docker-compose.test.yml down -v

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sema
      POSTGRES_PASSWORD: sema
      POSTGRES_DB: sema_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sema"]
      interval: 2s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: sema
      MYSQL_DATABASE: sema_test
      MYSQL_USER: sema
      MYSQL_PASSWORD: sema
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 2s
      timeout: 5s
      retries: 10

  test-sqlite:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      DATABASE_URL: "sqlite::memory:"
      BLOB_DIR: /tmp/blobs
      BASE_URL: "http://localhost:3000"
    command: cargo test

  test-postgres:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      DATABASE_URL: "postgres://sema:sema@postgres:5432/sema_test"
      BLOB_DIR: /tmp/blobs
      BASE_URL: "http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy
    command: cargo test

  test-mysql:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      DATABASE_URL: "mysql://sema:sema@mysql:3306/sema_test"
      BLOB_DIR: /tmp/blobs
      BASE_URL: "http://localhost:3000"
    depends_on:
      mysql:
        condition: service_healthy
    command: cargo test
