# Multi-driver integration test suite.
# Runs the Rust test suite against SQLite, PostgreSQL, and MySQL.
#
# Usage:
#   make test-all-drivers
#   # or manually:
#   docker compose -f docker-compose.test.yml up -d postgres mysql minio minio-create-bucket
#   docker compose -f docker-compose.test.yml run --rm test-sqlite
#   docker compose -f docker-compose.test.yml run --rm test-postgres
#   docker compose -f docker-compose.test.yml run --rm test-mysql
#   docker compose -f docker-compose.test.yml down -v

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sema
      POSTGRES_PASSWORD: sema
      POSTGRES_DB: sema_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sema"]
      interval: 2s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: sema
      MYSQL_DATABASE: sema_test
      MYSQL_USER: sema
      MYSQL_PASSWORD: sema
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 2s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-01-28T22-35-53Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MC_HOST_local: http://minioadmin:minioadmin@localhost:9000
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 5s
      retries: 10

  minio-create-bucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/sema-test-bucket;
      /usr/bin/mc anonymous set public myminio/sema-test-bucket;
      exit 0;
      "

  test-sqlite:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      DATABASE_URL: "sqlite::memory:"
      BLOB_DIR: /tmp/blobs
      BASE_URL: "http://localhost:3000"
    command: cargo test

  test-postgres:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      DATABASE_URL: "postgres://sema:sema@postgres:5432/sema_test"
      BLOB_DIR: /tmp/blobs
      BASE_URL: "http://localhost:3000"
      BLOB_S3_BUCKET: sema-test-bucket
      BLOB_S3_ENDPOINT: http://minio:9000
      BLOB_S3_REGION: us-east-1
      BLOB_S3_ACCESS_KEY_ID: minioadmin
      BLOB_S3_SECRET_ACCESS_KEY: minioadmin
      RUST_TEST_THREADS: 1
    depends_on:
      postgres:
        condition: service_healthy
      minio-create-bucket:
        condition: service_completed_successfully
    command: cargo test

  test-mysql:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      DATABASE_URL: "mysql://sema:sema@mysql:3306/sema_test"
      BLOB_DIR: /tmp/blobs
      BASE_URL: "http://localhost:3000"
      BLOB_S3_BUCKET: sema-test-bucket
      BLOB_S3_ENDPOINT: http://minio:9000
      BLOB_S3_REGION: us-east-1
      BLOB_S3_ACCESS_KEY_ID: minioadmin
      BLOB_S3_SECRET_ACCESS_KEY: minioadmin
      RUST_TEST_THREADS: 1
    depends_on:
      mysql:
        condition: service_healthy
      minio-create-bucket:
        condition: service_completed_successfully
    command: cargo test
