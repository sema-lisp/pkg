# Production stack: single-node SQLite + Litestream continuous replication to R2,
# with package tarballs in the same (or a separate) R2 bucket. The VM holds no
# irreplaceable state — see DEPLOYMENT.md (Path A) for restore + caveats.
#
#   docker compose -f docker-compose.prod.yml up -d
#
# Requires an .env with R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, and (if you use
# GitHub OAuth) a unique 32-byte OAUTH_TOKEN_KEY.

services:
  registry:
    image: ghcr.io/sema-lisp/sema-pkg:latest # or: build: .
    restart: unless-stopped
    # Give in-flight requests time to drain on SIGTERM before the kill.
    stop_grace_period: 30s
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - registry-data:/data
    environment:
      DATABASE_URL: "sqlite:///data/registry.db?mode=rwc"
      BASE_URL: ${BASE_URL:?set BASE_URL to your https origin}
      RUST_LOG: info
      BLOB_S3_BUCKET: ${BLOB_S3_BUCKET:-sema-packages}
      BLOB_S3_ENDPOINT: ${BLOB_S3_ENDPOINT:?set BLOB_S3_ENDPOINT to your R2 endpoint}
      BLOB_S3_REGION: auto
      BLOB_S3_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:?}
      BLOB_S3_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:?}
      OAUTH_TOKEN_KEY: ${OAUTH_TOKEN_KEY:-}

  litestream:
    image: litestream/litestream:0.5.14
    restart: unless-stopped
    depends_on:
      - registry
    volumes:
      - registry-data:/data
      - ./litestream.yml:/etc/litestream.yml:ro
    environment:
      # litestream.yml reads bucket + endpoint from these (by default the same
      # bucket as the blobs); credentials come from the LITESTREAM_* keys below.
      LITESTREAM_BUCKET: ${BLOB_S3_BUCKET:-sema-packages}
      LITESTREAM_ENDPOINT: ${BLOB_S3_ENDPOINT:?set BLOB_S3_ENDPOINT to your R2 endpoint}
      LITESTREAM_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:?}
      LITESTREAM_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:?}
    command: replicate

volumes:
  registry-data:
