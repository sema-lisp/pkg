app = "sema-pkg"
primary_region = "ams"

# Give Litestream time to flush the final WAL segment to Tigris after the app
# drains on stop (scale-to-zero / deploy). The final sync of a small metadata DB
# is fast; 10s is ample headroom over the default 5s.
kill_timeout = "10s"

[build]
  dockerfile = "Dockerfile"

[env]
  HOST = "0.0.0.0"
  PORT = "8080"
  DATABASE_URL = "sqlite:///data/registry.db?mode=rwc"
  BLOB_DIR = "/data/blobs"
  # Blobs live in Tigris (fly storage create injects BUCKET_NAME + AWS_* secrets);
  # BLOB_DIR is the fallback only. Switch BASE_URL to the custom domain once its
  # DNS + cert are set up (fly certs add pkg.sema-lang.com).
  BASE_URL = "https://pkg.sema-lang.com"
  RUST_LOG = "info"
  # Run Litestream in-container (single machine), supervising the app and
  # streaming the SQLite WAL to Tigris. Bucket/endpoint/creds come from the
  # Tigris secrets `fly storage create` injected. See entrypoint.sh.
  LITESTREAM_REPLICATE = "1"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  # Readiness probe: drains traffic when the DB is unreachable without a restart.
  [[http_service.checks]]
    method = "get"
    path = "/readyz"
    interval = "15s"
    timeout = "3s"
    grace_period = "5s"

[mounts]
  source = "sema_pkg_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  # Headroom for concurrent readers plus in-flight tarball uploads (up to
  # ~50 MB each buffered before storage).
  memory = "1gb"
