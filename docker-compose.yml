services:
  registry:
    build: .
    stop_grace_period: 30s
    ports:
      # Host port is configurable (make dev-docker picks a free one); container stays 3000.
      - "${PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      RUST_LOG: info
      DATABASE_URL: sqlite://data/registry.db?mode=rwc
      BLOB_DIR: data/blobs
      BASE_URL: ${BASE_URL:-http://localhost:3000}
