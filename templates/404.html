{% extends "base.html" %}
{% block title %}{{ heading }} — Sema Pkg{% endblock %}
{% block head %}
<style>
  .notfound {
    max-width: 560px;
    margin: 96px auto;
    text-align: center;
    padding: 0 24px;
  }

  .notfound-code {
    font-family: var(--serif);
    font-size: 120px;
    line-height: 1;
    font-weight: 300;
    color: var(--gold);
    letter-spacing: 0.02em;
  }

  .notfound-title {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 300;
    color: var(--text-bright);
    margin-top: 8px;
  }

  .notfound-msg {
    font-size: 14px;
    color: var(--text-dim);
    margin-top: 12px;
    line-height: 1.6;
  }

  .notfound-msg code {
    font-family: var(--mono);
    color: var(--gold);
  }

  .notfound-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 32px;
  }

  .notfound-hr {
    width: 48px;
    height: 1px;
    background: var(--border);
    border: 0;
    margin: 40px auto 0;
  }

  .notfound-hint {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 24px;
  }

  .notfound-hint a { color: var(--gold); }
</style>
{% endblock %}
{% block content %}
<div class="page-content">
  <div class="notfound" data-testid="notfound">
    <div class="notfound-code">404</div>
    <h1 class="notfound-title">{{ heading }}</h1>
    <p class="notfound-msg">{{ message }}{% if let Some(s) = subject %} <code>{{ s }}</code>{% endif %}.</p>
    <div class="notfound-actions">
      <a href="/search" class="btn btn-primary" style="font-size:13px; padding:10px 20px;">Browse packages</a>
      <a href="/" class="btn btn-ghost" style="font-size:13px; padding:10px 20px;">Home</a>
    </div>
    <hr class="notfound-hr">
    <p class="notfound-hint">Looking to publish? <a href="https://sema-lang.com/docs/">Read the docs</a>.</p>
  </div>
</div>
{% endblock %}
